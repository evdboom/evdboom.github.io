name: github pages

on:
  push:
    branches:
      - main

permissions:
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Checkout the code
      - uses: actions/checkout@v4

      # Install .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Publish the site
      - name: Publish
        run: dotnet publish OptionA.Site.slnx -c:Release -o:publish -p:GHPages=true

      # Create index.html copies for all client-side routes so GitHub Pages
      # serves them with HTTP 200 instead of falling back to 404.html.
      - name: Create route index files
        run: |
          PUBLISH_DIR=publish/wwwroot
          INDEX=$PUBLISH_DIR/index.html

          # Parameterised routes that cannot be auto-discovered from @page directives.
          # Add a line here whenever a new concrete parameterised route is deployed.
          STATIC_ROUTES=(
            projects/blazor
            projects/devteam
            projects/bindery
            projects/bindery/privacy
            documentation/blog
            documentation/blogbuilder
            documentation/components
            documentation/componentsdirect
            documentation/storage
          )

          # Auto-discover non-parameterised @page routes from razor files
          while IFS= read -r route; do
            [[ -z "$route" ]] && continue
            mkdir -p "$PUBLISH_DIR/$route"
            cp "$INDEX" "$PUBLISH_DIR/$route/index.html"
          done < <(grep -r '@page "/' Site --include="*.razor" \
                     | grep -v '{' \
                     | sed 's/.*@page "\/\([^"]*\)".*/\1/')

          # Create index.html for known parameterised routes
          for route in "${STATIC_ROUTES[@]}"; do
            mkdir -p "$PUBLISH_DIR/$route"
            cp "$INDEX" "$PUBLISH_DIR/$route/index.html"
          done

      # Upload artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
